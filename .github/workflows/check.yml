name: Vérification logements CROUS Lyon

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: pip install requests beautifulsoup4 playwright

      - name: Installer le navigateur Chromium
        run: python -m playwright install --with-deps chromium

      - name: Lancer la vérification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_crous.py

      - name: Sauvegarder l'état (commit automatique)
        run: |
          git config user.name "crous-lyon-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/seen.json
          git diff --quiet --cached || git commit -m "update seen listings [skip ci]"
          git push
